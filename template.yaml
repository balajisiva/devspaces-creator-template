apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: devspaces-devfile-creator
  title: OpenShift DevSpaces Workspace Creator
  description: Create a new development workspace with a customized devfile for OpenShift DevSpaces
  tags:
    - devspaces
    - devfile
    - openshift
    - workspace
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Project Information
      required:
        - name
        - owner
      properties:
        name:
          title: Project Name
          type: string
          description: Name of your project (lowercase, no spaces)
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true
          ui:help: 'Example: my-awesome-app'

        displayName:
          title: Display Name
          type: string
          description: Human-readable name for your workspace
          default: My Application

        description:
          title: Description
          type: string
          description: Brief description of your project
          ui:widget: textarea
          ui:options:
            rows: 3

        owner:
          title: Owner
          type: string
          description: Team or individual owner
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: [Group, User]

        repository:
          title: Repository URL
          type: string
          description: Git repository URL (optional)
          ui:help: 'Example: https://github.com/org/repo.git'

    - title: Technology Stack
      required:
        - techStack
      properties:
        techStack:
          title: Primary Technology Stack
          type: string
          description: Choose your main development stack
          enum:
            - nodejs
            - java-spring
            - python-django
            - go
            - dotnet
            - react
            - angular
            - vue
          enumNames:
            - 'Node.js'
            - 'Java Spring Boot'
            - 'Python Django'
            - 'Go'
            - '.NET Core'
            - 'React'
            - 'Angular'
            - 'Vue.js'
          default: nodejs

        language:
          title: Programming Language
          type: string
          enum:
            - javascript
            - typescript
            - java
            - python
            - go
            - csharp
          enumNames:
            - 'JavaScript'
            - 'TypeScript'
            - 'Java'
            - 'Python'
            - 'Go'
            - 'C#'
          default: typescript

    - title: Container Configuration
      required:
        - containerImage
      properties:
        containerImage:
          title: Base Container Image
          type: string
          description: Base image for your dev container
          enum:
            - registry.redhat.io/devspaces/udi-rhel8:latest
            - registry.redhat.io/devspaces/udi-rhel9:latest
            - node:18-alpine
            - python:3.11-slim
            - openjdk:17-jdk-slim
            - golang:1.21-alpine
          default: registry.redhat.io/devspaces/udi-rhel8:latest

        memoryLimit:
          title: Memory Limit
          type: string
          description: Maximum memory for the container
          enum:
            - 1Gi
            - 2Gi
            - 4Gi
            - 8Gi
          default: 2Gi

        cpuLimit:
          title: CPU Limit
          type: string
          description: Maximum CPU cores (in millicores)
          enum:
            - 500m
            - 1000m
            - 2000m
            - 4000m
          default: 1000m

        mainPort:
          title: Main Application Port
          type: number
          description: Primary port for your application
          default: 3000
          minimum: 1024
          maximum: 65535

    - title: Database & Services
      properties:
        includeDatabase:
          title: Include Database
          type: boolean
          description: Add a database to your workspace
          default: false

        databaseType:
          title: Database Type
          type: string
          description: Choose your database
          enum:
            - postgresql
            - mysql
            - mongodb
            - redis
            - none
          enumNames:
            - 'PostgreSQL'
            - 'MySQL'
            - 'MongoDB'
            - 'Redis'
            - 'None'
          default: postgresql
          dependencies:
            includeDatabase:
              oneOf:
                - properties:
                    includeDatabase:
                      const: true

        databaseName:
          title: Database Name
          type: string
          description: Name of the database to create
          default: myapp_dev
          dependencies:
            includeDatabase:
              oneOf:
                - properties:
                    includeDatabase:
                      const: true

        additionalServices:
          title: Additional Services
          type: array
          description: Add more services to your workspace
          items:
            type: string
            enum:
              - redis
              - rabbitmq
              - kafka
              - elasticsearch
          uniqueItems: true
          ui:widget: checkboxes

    - title: DevSpaces Configuration
      properties:
        autoStart:
          title: Auto-start Application
          type: boolean
          description: Automatically run the application after workspace starts
          default: true

        persistentStorage:
          title: Enable Persistent Storage
          type: boolean
          description: Use persistent volumes for data
          default: true

        volumeSize:
          title: Volume Size
          type: string
          description: Size of persistent volumes
          enum:
            - 1Gi
            - 2Gi
            - 5Gi
            - 10Gi
          default: 2Gi
          dependencies:
            persistentStorage:
              oneOf:
                - properties:
                    persistentStorage:
                      const: true

        createDevSpaces:
          title: Create DevSpaces Workspace
          type: boolean
          description: Automatically create and start the DevSpaces workspace
          default: false

        devspacesUrl:
          title: DevSpaces URL
          type: string
          description: Your OpenShift DevSpaces instance URL
          default: https://devspaces.apps.cluster.example.com
          dependencies:
            createDevSpaces:
              oneOf:
                - properties:
                    createDevSpaces:
                      const: true

  steps:
    - id: fetch-base
      name: Fetch Base Template
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          displayName: ${{ parameters.displayName }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          techStack: ${{ parameters.techStack }}
          language: ${{ parameters.language }}
          containerImage: ${{ parameters.containerImage }}
          memoryLimit: ${{ parameters.memoryLimit }}
          cpuLimit: ${{ parameters.cpuLimit }}
          mainPort: ${{ parameters.mainPort }}
          includeDatabase: ${{ parameters.includeDatabase }}
          databaseType: ${{ parameters.databaseType }}
          databaseName: ${{ parameters.databaseName }}
          additionalServices: ${{ parameters.additionalServices }}
          autoStart: ${{ parameters.autoStart }}
          persistentStorage: ${{ parameters.persistentStorage }}
          volumeSize: ${{ parameters.volumeSize }}
          repository: ${{ parameters.repository }}
          currentYear: ${{ parameters.currentYear | default(2024) }}

    - id: publish
      name: Publish to Repository
      action: publish:github
      input:
        allowedHosts: ['github.com']
        description: DevSpaces workspace for ${{ parameters.displayName }}
        repoUrl: github.com?owner=${{ parameters.owner }}&repo=${{ parameters.name }}
        defaultBranch: main
        repoVisibility: public

    - id: register
      name: Register to Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

    - id: create-devspaces-workspace
      if: ${{ parameters.createDevSpaces }}
      name: Create DevSpaces Workspace
      action: devspaces:create
      input:
        devspacesUrl: ${{ parameters.devspacesUrl }}
        repoUrl: ${{ steps.publish.output.remoteUrl }}
        workspaceName: ${{ parameters.name }}-devspace

  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
      - title: Open in DevSpaces
        if: ${{ parameters.createDevSpaces }}
        url: ${{ parameters.devspacesUrl }}#${{ steps.publish.output.remoteUrl }}
      - title: View Devfile
        url: ${{ steps.publish.output.remoteUrl }}/blob/main/devfile.yaml
    text:
      - title: Next Steps
        content: |
          Your DevSpaces workspace has been created!

          Repository: ${{ steps.publish.output.remoteUrl }}

          To start your workspace:
          1. Go to: ${{ parameters.devspacesUrl }}
          2. Click "Create Workspace"
          3. Enter: ${{ steps.publish.output.remoteUrl }}

          Or use direct link:
          ${{ parameters.devspacesUrl }}#${{ steps.publish.output.remoteUrl }}
